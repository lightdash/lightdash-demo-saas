name: 'lightdash_demo_saas'
config-version: 2
profile: 'lightdash_demo_saas'
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  lightdash_demo_saas:
    +materialized: table
    fanouts_examples:
     +meta:
        group_label: fanouts
    maps_examples:
     +meta:
        group_label: maps
    lod_examples:
     +meta:
        group_label: lod

seeds:
  lightdash_demo_saas:
    users_raw:
      +column_types:
        created_at: timestamp
        first_logged_in_at: timestamp
        latest_logged_in_at: timestamp
    marketing_leads:
      +column_types:
        created_at: timestamp
    tracks_raw:
      +column_types:
        event_timestamp: timestamp
    deals_raw:
      +column_types:
        created_date: timestamp
