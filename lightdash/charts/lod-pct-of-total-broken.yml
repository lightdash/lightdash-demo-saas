name: "LOD Bug: % of Total Customers by Product (Broken)"
description: >-
  Demonstrates the LOD denominator grain problem. Product B shows 20% instead of
  the correct 16.7% because the denominator loses the South region's 2 customers
  when there are no Product B sales in South. Product A happens to be correct (33.3%)
  because it has sales in all regions. This chart is an acceptance test for LOD EXCLUDE —
  when fixed, Product B should show 16.7%.
tableName: lod_pct_of_total_demo
metricQuery:
  exploreName: lod_pct_of_total_demo
  dimensions:
    - lod_pct_of_total_demo_product_name
  metrics:
    - lod_pct_of_total_demo_pct_of_total_customers
    - lod_pct_of_total_demo_total_customers_purchasing
    - lod_pct_of_total_demo_total_customers_in_all_regions
  filters: {}
  sorts:
    - fieldId: lod_pct_of_total_demo_product_name
      descending: false
  limit: 500
  metricOverrides: {}
  dimensionOverrides: {}
  tableCalculations: []
  additionalMetrics: []
  customDimensions: []
chartConfig:
  type: cartesian
  config:
    layout:
      xField: lod_pct_of_total_demo_product_name
      yField:
        - lod_pct_of_total_demo_pct_of_total_customers
    eChartsConfig:
      series:
        - type: bar
          encode:
            xRef:
              field: lod_pct_of_total_demo_product_name
            yRef:
              field: lod_pct_of_total_demo_pct_of_total_customers
          label:
            show: true
            position: top
slug: lod-pct-of-total-broken
tableConfig:
  columnOrder:
    - lod_pct_of_total_demo_product_name
    - lod_pct_of_total_demo_total_customers_purchasing
    - lod_pct_of_total_demo_total_customers_in_all_regions
    - lod_pct_of_total_demo_pct_of_total_customers
spaceSlug: shared
version: 1
