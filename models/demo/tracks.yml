models:
  - name: tracks
    meta:
      description: Product event tracking — one row per event emitted by a user in the application.
      primary_key: id
      ai_hint: |
          This is a product analytics events table. Each row is a single tracked event (login,
          feature usage, workspace action, etc.) tied to a user via user_id.
          Use this for product engagement, feature adoption, DAU/WAU/MAU, and funnel analysis.
      joins:
        - join: users
          sql_on: ${tracks.user_id} = ${users.user_id}
          type: left
          relationship: many-to-one

    columns:
      - name: id
        description: "Unique identifier for the tracked event"
        tests:
          - not_null
          - unique
        meta:
          dimension:
            type: string
            label: Event ID
          metrics:
            total_events:
              type: count
              description: "Total number of tracked events"
              groups: ['Event Volume']
            total_logins:
              label: Total Logins
              description: "Count of successful login events"
              type: count
              filters:
                - name: login_successful
              groups: ['Event Volume']
            total_failed_logins:
              label: Total Failed Logins
              description: "Count of failed login events"
              type: count
              filters:
                - name: login_failed
              groups: ['Event Volume']
            total_reports_generated:
              label: Total Reports Generated
              description: "Count of report_generated events"
              type: count
              filters:
                - name: report_generated
              groups: ['Feature Usage']
            total_workflows_created:
              label: Total Workflows Created
              description: "Count of workflow_created events"
              type: count
              filters:
                - name: workflow_created
              groups: ['Feature Usage']

      - name: user_id
        description: "The user who triggered the event"
        tests:
          - not_null
        meta:
          dimension:
            type: string
            label: User ID
          metrics:
            active_users:
              type: count_distinct
              label: Active Users
              description: "Distinct users with at least one tracked event"
              groups: ['Engagement']
            users_with_successful_login:
              type: count_distinct
              label: Users With Successful Login
              description: "Distinct users that have logged in successfully"
              filters:
                - name: login_successful
              groups: ['Engagement']

      - name: name
        description: "Name of the event (e.g. login_successful, report_generated)"
        tests:
          - not_null
        meta:
          dimension:
            type: string
            label: Event Name
          metrics:
            unique_event_names:
              type: count_distinct
              label: Unique Event Names
              description: "Distinct number of event names observed"
              groups: ['Event Volume']

      - name: timestamp
        description: "Timestamp when the event occurred"
        tests:
          - not_null
        meta:
          dimension:
            type: timestamp
            label: Event Timestamp
            time_intervals: ['DAY', 'WEEK', 'MONTH', 'YEAR', 'QUARTER', 'MONTH_NAME', 'QUARTER_NAME']

    metrics:
      events_per_active_user:
        type: number
        label: Events per Active User
        description: "Average number of tracked events per active user"
        sql: SAFE_DIVIDE(${total_events}, ${active_users})
        format: '#,##0.00'
        groups: ['Engagement']
