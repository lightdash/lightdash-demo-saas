models:
  - name: deals
    meta:
      primary_key: deal_id
      description: One row per deal in our CRM. Tracks pipeline stage, plan, seats, and amount.
      joins:
        - join: accounts
          sql_on: ${deals.account_id} = ${accounts.account_id}
          type: left
          relationship: many-to-one
    columns:
      - name: deal_id
        description: "Unique identifier for the deal"
        meta:
          dimension:
            type: string
            label: Deal ID
          metrics:
            unique_deals:
              type: count_distinct
              label: Unique Deals
              description: Distinct count of all deals
              spotlight:
                visibility: show
                categories:
                  - kpi
            new_deals:
              type: count_distinct
              label: New Deals
              description: Distinct count of deals currently in the "New" stage
              filters:
                - stage: 'New'
            won_deals:
              type: count_distinct
              label: Won Deals
              description: Distinct count of deals in the "Won" stage
              filters:
                - stage: 'Won'
              spotlight:
                visibility: show
                categories:
                  - kpi
            lost_deals:
              type: count_distinct
              label: Lost Deals
              description: Distinct count of deals in the "Lost" stage
              filters:
                - stage: 'Lost'
            open_deals:
              type: count_distinct
              label: Open Deals
              description: Distinct count of deals still in pipeline (not Won or Lost)
              filters:
                - stage: '!Won'
                - stage: '!Lost'
            win_rate:
              type: number
              label: Win Rate
              description: Won deals as a percentage of closed (Won + Lost) deals
              format: percent
              sql: SAFE_DIVIDE(${won_deals}, ${won_deals} + ${lost_deals})

      - name: account_id
        description: "Account this deal belongs to (joins to accounts)"
        meta:
          dimension:
            type: number
            label: Account ID

      - name: stage
        description: "Pipeline stage (New, Qualified, PoC, Negotiation, Won, Lost)"
        meta:
          dimension:
            type: string

      - name: plan
        description: "Plan type the deal is for (Basic or Professional)"
        meta:
          dimension:
            type: string

      - name: seats
        description: "Number of seats included in the deal"
        meta:
          dimension:
            type: number
          metrics:
            total_seats:
              type: sum
              label: Total Seats
              description: Sum of seats across all deals
            total_won_seats:
              type: sum
              label: Total Won Seats
              description: Sum of seats across deals in the "Won" stage
              filters:
                - stage: 'Won'
            average_seats:
              type: average
              label: Average Seats per Deal
              description: Average seat count across all deals
              round: 1

      - name: amount
        description: "Total dollar value of the deal"
        meta:
          dimension:
            type: number
            format: 'usd'
          metrics:
            total_amount:
              type: sum
              label: Total Deal Amount
              description: Sum of deal amounts across all deals (pipeline value)
              format: 'usd'
              spotlight:
                visibility: show
                categories:
                  - kpi
            total_won_amount:
              type: sum
              label: Total Won Amount
              description: Sum of deal amounts for deals in the "Won" stage (closed-won revenue)
              format: 'usd'
              filters:
                - stage: 'Won'
              spotlight:
                visibility: show
                categories:
                  - kpi
            total_lost_amount:
              type: sum
              label: Total Lost Amount
              description: Sum of deal amounts for deals in the "Lost" stage
              format: 'usd'
              filters:
                - stage: 'Lost'
            total_open_amount:
              type: sum
              label: Total Open Pipeline Amount
              description: Sum of deal amounts for deals still in pipeline (not Won or Lost)
              format: 'usd'
              filters:
                - stage: '!Won'
                - stage: '!Lost'
            average_amount:
              type: average
              label: Average Deal Size
              description: Average deal amount across all deals
              format: 'usd'
            average_won_amount:
              type: average
              label: Average Won Deal Size
              description: Average deal amount for deals in the "Won" stage
              format: 'usd'
              filters:
                - stage: 'Won'
            max_amount:
              type: max
              label: Largest Deal
              description: The largest single deal amount
              format: 'usd'

      - name: created_date
        description: "Date the deal was created in the CRM"
        meta:
          dimension:
            type: date
            time_intervals: ['DAY', 'WEEK', 'MONTH', 'MONTH_NAME', 'QUARTER', 'YEAR']
